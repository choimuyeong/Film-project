services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: film-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////data/movie_review.db
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: film-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
